<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="board">
        <div class="column">
            <h2>To Do</h2>
            <div class="task-list" id="todo">
                <div class="task" draggable="true">Task 1</div>
                <div class="task" draggable="true">Task 2</div>
            </div>
        </div>

        <div class="column">
            <h2>In Progress</h2>
            <div class="task-list" id="progress">
                <div class="task" draggable="true">Task 3</div>
            </div>
        </div>

        <div class="column">
            <h2>Done</h2>
            <div class="task-list" id="done">
                <div class="task" draggable="true">Task 4</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
