<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard">

        <h1>Analytics Dashboard</h1>

        <!-- KPI Cards -->
        <div class="kpi-grid">
            <div class="card">
                <h3>Total Revenue</h3>
                <p>$25,400</p>
            </div>

            <div class="card">
                <h3>Users</h3>
                <p>1,250</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>342</p>
            </div>

            <div class="card">
                <h3>Growth</h3>
                <p>18%</p>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <h2>Recent Transactions</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Customer</th>
                        <th>Amount</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>#1001</td>
                        <td>John</td>
                        <td>$120</td>
                        <td>Completed</td>
                    </tr>

                    <tr>
                        <td>#1002</td>
                        <td>Sarah</td>
                        <td>$80</td>
                        <td>Pending</td>
                    </tr>

                    <tr>
                        <td>#1003</td>
                        <td>Mike</td>
                        <td>$250</td>
                        <td>Completed</td>
                    </tr>

                    <tr>
                        <td>#1004</td>
                        <td>Emma</td>
                        <td>$95</td>
                        <td>Cancelled</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</body>
</html>
