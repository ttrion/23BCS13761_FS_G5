  <header class="bg-slate-900 text-white px-6 py-4">
    <div class="flex items-center justify-between gap-4">

      <!-- Logo -->
      <h1 class="text-2xl font-bold text-yellow-400">
        Amazon
      </h1>

      <!-- Search -->
      <div class="flex-1 max-w-2xl">
        <input

          placeholder="Search products..."

      </div>

      <!-- Cart -->
      <button class="text-2xl">
        🛒
      </button>

    </div>
  </header>

  <!-- Main Layout -->
  <div class="flex flex-col md:flex-row">

    <aside class="bg-white w-full md:w-64 p-5 shadow">

        Filters
      </h2>

      <div class="mb-6">
        <h3 class="font-semibold mb-2">Category</h3>

        <label class="block">
          <input type="checkbox">
          Electronics
        </label>

        <label class="block">
          <input type="checkbox">
          Fashion
        </label>

        <label class="block">
          <input type="checkbox">
          Home
        </label>
      </div>

      <!-- Price -->
      <div class="mb-6">
        <h3 class="font-semibold mb-2">Price</h3>

        <input
          type="range"
          min="0"
          max="1000"
          class="w-full"
        >
      </div>

      <!-- Rating -->
      <div>
        <h3 class="font-semibold mb-2">Rating</h3>

        <select class="border p-2 w-full">
          <option>4★ & Above</option>
          <option>3★ & Above</option>
          <option>2★ & Above</option>
        </select>
      </div>

    </aside>

    <!-- Product Grid -->
    <main class="flex-1 p-6">

                >

                <p>Max Price: $<span id="priceValue">1000</span></p>
            </div>

        </aside>
